<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="login.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
    <header>
        <img class="logo" src="/home/victor_hugo/Documentos/MEU_SITE_PI/logo_cavalo-Photoroom.png" alt="Logo - Imagem de um cavalo" width="150px">
        <nav class="navbar"> 
            <ul class="nav-links">
                <li><a href="#">Home</a></li>
                <li><a href="#">Sobre mim</a></li>
                <li><a href="#">Links Úteis</a></li>
                <li><a href="#">Contato</a></li>
            </ul>
        </nav>
        <a class="buttons" href="#">
            <button onclick="login()" class="login">Login</button>
            <button onclick="cadastro()" class="cadastro">Cadastro</button>
        </a>
    </header>

    <div class="box-formulario">
        <div class="container-login">
            <div class="login-topo">
                <header>Login</header>
            </div>
            <div class="login-input">
                <input type="email" class="input" placeholder="E-mail">
                <i class='bx bx-envelope'></i>
            </div>
            <div class="login-input">
                <input type="password" class="input" placeholder="Senha">
                <i class='bx bx-lock-alt'></i>
            </div>
            <div class="login-botao">
                <button onclick="login()">Entrar</button>
            </div>
            <div class="login-link">
                <span>Não tem conta?<a href="cadastro.html">Cadastre-se</a></span> 
            </div>
        </div>
    </div>
</body>
</html>
